<script>
  document.addEventListener("DOMContentLoaded", () => {
    // 1. TODO 标签渲染适配（维持原有处理逻辑）
    for (let level = 1; level <= 6; level++) {
      document.querySelectorAll(`h${level}`).forEach(h => {
        const todo = h.querySelector('.todo.TODO');
        const done = h.querySelector('.done.DONE');
        if (todo || done) {
          const targetClass = todo ? 'red-text' : 'green-text';
          const nodes = Array.from(h.childNodes);
          const marker = todo || done;
          const index = nodes.indexOf(marker);
          for (let i = index + 1; i < nodes.length; i++) {
            const node = nodes[i];
            if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) {
              const span = document.createElement('span');
              span.className = targetClass;
              span.textContent = node.textContent;
              h.replaceChild(span, node);
              break;
            }
          }
        }
      });
    }

    // 2. 图片滑块交互层（新增动态显隐控制）
    document.querySelectorAll('.img-slider-container').forEach(container => {
      const slider = container.querySelector('.img-slider');
      const btnPrev = container.querySelector('.slider-btn.prev');
      const btnNext = container.querySelector('.slider-btn.next');

      if (slider && btnPrev && btnNext) {
        // 核心状态测算函数
        const checkEdges = () => {
          // 设定 2px 容差区间，规避不同设备像素比造成的浮点数精度偏差
          const isStart = slider.scrollLeft <= 2;
          const isEnd = slider.scrollLeft + slider.clientWidth >= slider.scrollWidth - 2;

          // 操作 DOM 层干预可见度与触控响应
          btnPrev.style.opacity = isStart ? '0' : '1';
          btnPrev.style.pointerEvents = isStart ? 'none' : 'auto';

          btnNext.style.opacity = isEnd ? '0' : '1';
          btnNext.style.pointerEvents = isEnd ? 'none' : 'auto';
        };

        // 事件监听矩阵
        slider.addEventListener('scroll', checkEdges);
        window.addEventListener('resize', checkEdges);

        // 按钮驱动逻辑
        btnPrev.addEventListener('click', () => {
          slider.scrollBy({ left: -slider.clientWidth, behavior: 'smooth' });
        });
        btnNext.addEventListener('click', () => {
          slider.scrollBy({ left: slider.clientWidth, behavior: 'smooth' });
        });

        // 推迟 150 毫秒执行初始侦测，旨在等待内部图像资源占据实际尺寸
        setTimeout(checkEdges, 150);
      }
    });
  });
</script>
